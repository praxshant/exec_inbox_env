name: Trigger auto deployment for exec-inbox-api

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/exec-inbox-api-AutoDeployTrigger-dfc34e18-63e5-40a3-8442-8231f28683b6.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.EXECINBOXAPI_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.EXECINBOXAPI_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.EXECINBOXAPI_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: 
          registryUsername: ${{ secrets.EXECINBOXAPI_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.EXECINBOXAPI_REGISTRY_PASSWORD }}
          containerAppName: exec-inbox-api
          resourceGroup: exec-inbox-rg
          imageToBuild: default/[parameters('containerAppName')]:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


